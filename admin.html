<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Adomi Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 bg-dark text-white min-vh-100 p-3">
                <h4>Adomi Admin</h4>
                <hr>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link text-white" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Course Management</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#">Students</a></li>
                </ul>
            </nav>

            <main class="col-md-10 p-4">
                <h2>Admin Dashboard</h2>
                <div class="row g-3">
                    <div class="col-md-3"><div class="card p-3"><h5>Total Students</h5><p id="total-students">0</p></div></div>
                    <div class="col-md-3"><div class="card p-3"><h5>Total Courses</h5><p id="total-courses">0</p></div></div>
                </div>

                <div class="mt-5 p-4 bg-white rounded">
                    <h3>Add New Course</h3>
                    <input type="text" id="course-name" class="form-control mb-2" placeholder="Course Name">
                    <input type="number" id="course-price" class="form-control mb-2" placeholder="Price">
                    <button class="btn btn-primary" onclick="addCourse()">Add Course</button>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগ এখানে বসান
        const firebaseConfig = { /* আপনার কনফিগ কোডটি এখানে দিন */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // কোর্স এড করার ফাংশন
        window.addCourse = async () => {
            const name = document.getElementById("course-name").value;
            const price = document.getElementById("course-price").value;
            try {
                await addDoc(collection(db, "courses"), { name, price });
                alert("Course Added!");
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
