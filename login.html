<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<style>
body{
font-family:Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="window.location='dashboard.html'">
Login
</button>

</div>

</body>
</html>
