<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Adomi Academy</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0b111e;       
            --bg-card: #111827;       
            --text-main: #ffffff;     
            --text-muted: #9ca3af;    
            --primary-pink: #ff2d55;  
            --accent-purple: #6366f1; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 45, 85, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-logo {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .auth-card h2 { font-size: 24px; margin-bottom: 8px; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--text-muted); font-size: 16px; }
        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-pink);
            background: rgba(255, 45, 85, 0.02);
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.1);
        }

        .auth-btn {
            width: 100%;
            background-color: var(--primary-pink);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.2);
            transition: 0.3s;
            margin-top: 5px;
        }

        .auth-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .google-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .google-btn img { width: 18px; height: 18px; }

        .extra-links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .extra-links a { color: var(--primary-pink); text-decoration: none; font-weight: 600; }
        .back-home { margin-top: 25px; display: inline-block; font-size: 13px; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .back-home:hover { color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-card" id="login-form">
            <a href="index.html" class="auth-logo">
                <i class="fa-solid fa-graduation-cap" style="color: var(--primary-pink);"></i>
                Adomi Academy
            </a>
            <h2>Welcome Back</h2>
            <p>আপনার একাউন্টে লগইন করে শেখা শুরু করুন</p>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
            </div>

            <button class="auth-btn" id="btn-login">Login to Account</button>

            <div class="divider">OR</div>
            <button class="google-btn btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_活跃图标.svg" alt="Google">
                Continue with Google
            </button>

            <div class="extra-links">
                Don't have an account? <a href="#" onclick="toggleAuth()">Register Now</a>
            </div>
            <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>

        <div class="auth-card hidden" id="register-form">
            <a href="index.html" class="auth-logo">
                <i class="fa-solid fa-graduation-cap" style="color: var(--primary-pink);"></i>
                Adomi Academy
            </a>
            <h2>Create Account</h2>
            <p>আমাদের একাডেমিতে জয়েন করতে নিচের তথ্যগুলো দিন</p>

            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Enter your name">
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="input-group">
                <label>Set Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
            </div>

            <button class="auth-btn" id="btn-register">Create My Account</button>

            <div class="divider">OR</div>
            <button class="google-btn btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_活跃图标.svg" alt="Google">
                Continue with Google
            </button>

            <div class="extra-links">
                Already have an account? <a href="#" onclick="toggleAuth()">Login Here</a>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার ফায়ারবেসের একদম লেটেস্ট ও একুরেট ডাটা এখানে আপডেট করে দেওয়া হলো
        const firebaseConfig = {
   const firebaseConfig = {
  apiKey: "AIzaSyDitknDA_jj5OsWbLb4DVlRXQ1HVMrLJIs",
  authDomain: "adomi-academy.firebaseapp.com",
  projectId: "adomi-academy",
  storageBucket: "adomi-academy.firebasestorage.app",
  messagingSenderId: "1048951424363",
  appId: "1:1048951424363:web:4ea1e1075dd5e04e4e382e",
  measurementId: "G-SJFN79PQ1T"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.toggleAuth = function() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        // ১. ইমেইল/পাসওয়ার্ড রেজিস্ট্রেশন
        document.getElementById('btn-register').addEventListener('click', () => {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const name = document.getElementById('reg-name').value.trim();

            if(!email || !password || !name) {
                alert('অনুগ্রহ করে সব তথ্য দিন!');
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert('আপনার অ্যাকাউন্ট সফলভাবে তৈরি হয়েছে! এবার লগইন করুন।');
                    toggleAuth();
                })
                .catch((error) => {
                    if (error.code === 'auth/weak-password') {
                        alert('পাসওয়ার্ডটি দুর্বল! অন্তত ৬ ডিজিটের পাসওয়ার্ড দিন।');
                    } else if (error.code === 'auth/email-already-in-use') {
                        alert('এই ইমেইলটি দিয়ে ইতিমধ্যে অ্যাকাউন্ট খোলা হয়েছে!');
                    } else {
                        alert('ভুল হয়েছে: ' + error.message);
                    }
                });
        });

        // ২. ইমেইল/পাসওয়ার্ড লগইন
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if(!email || !password) {
                alert('ইমেইল এবং পাসওয়ার্ড লিখুন!');
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert('লগইন সফল হয়েছে!');
                    window.location.href = 'dashboard.html'; 
                })
                .catch((error) => {
                    alert('দুঃখিত! ভুল ইমেইল বা পাসওয়ার্ড দিয়েছেন।');
                });
        });

        // ৩. গুগল দিয়ে ওয়ান-ক্লিক লগইন
        const googleButtons = document.querySelectorAll('.btn-google');
        googleButtons.forEach(button => {
            button.addEventListener('click', () => {
                signInWithPopup(auth, provider)
                    .then((result) => {
                        alert('গুগল লগইন সফল হয়েছে!');
                        window.location.href = 'dashboard.html';
                    })
                    .catch((error) => {
                        alert('গুগল লগইন বাতিল বা ব্যর্থ হয়েছে।');
                    });
                });
        });
    </script>
</body>
</html>
