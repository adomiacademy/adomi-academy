<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Adomi Academy</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0b111e;       
            --bg-card: #111827;       
            --text-main: #ffffff;     
            --text-muted: #9ca3af;    
            --primary-pink: #ff2d55;  
            --accent-purple: #6366f1; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 45, 85, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-logo {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .auth-card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-pink);
            background: rgba(255, 45, 85, 0.02);
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.1);
        }

        .auth-btn {
            width: 100%;
            background-color: var(--primary-pink);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.2);
            transition: 0.3s;
            margin-top: 10px;
            display: block;
            text-decoration: none;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .extra-links {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .extra-links a {
            color: var(--primary-pink);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            margin-top: 30px;
            display: inline-block;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-home:hover {
            color: white;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-card" id="login-form">
            <a href="index.html" class="auth-logo">
                <i class="fa-solid fa-graduation-cap" style="color: var(--primary-pink);"></i>
                Adomi Academy
            </a>
            <h2>Welcome Back</h2>
            <p>আপনার একাউন্টে লগইন করে শেখা শুরু করুন</p>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
            </div>

            <button class="auth-btn" onclick="handleLogin()">Login to Account</button>

            <div class="extra-links">
                Don't have an account? <a href="#" onclick="toggleAuth()">Register Now</a>
            </div>
            
            <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>

        <div class="auth-card hidden" id="register-form">
            <a href="index.html" class="auth-logo">
                <i class="fa-solid fa-graduation-cap" style="color: var(--primary-pink);"></i>
                Adomi Academy
            </a>
            <h2>Create Account</h2>
            <p>আমাদের একাডেমিতে জয়েন করতে নিচের তথ্যগুলো দিন</p>

            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Enter your name">
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="input-group">
                <label>Set Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
            </div>

            <button class="auth-btn" onclick="handleRegister()">Create My Account</button>

            <div class="extra-links">
                Already have an account? <a href="#" onclick="toggleAuth()">Login Here</a>
            </div>
        </div>

    </div>

    <script>
        // ফর্ম অদলবদল (Login / Register) করার ফাংশন
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        // ১. রেজিস্ট্রেশন করার সময় ডাটা ব্রাউজারে সেভ করার ফাংশন
        function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            // খালি ইনপুট চেক করা
            if(name === "" || email === "" || password === "") {
                alert('দয়া করে সবগুলো বক্স পূরণ করুন!');
                return;
            }

            // ব্রাউজারের মেমোরিতে (LocalStorage) ডাটা সেভ করে রাখা হচ্ছে
            localStorage.setItem('saved_email', email);
            localStorage.setItem('saved_password', password);
            localStorage.setItem('saved_name', name);

            alert('আপনার একাউন্ট সফলভাবে তৈরি হয়েছে! এবার সঠিক ইমেইল ও পাসওয়ার্ড দিয়ে লগইন করুন।');
            toggleAuth(); // অটোমেটিক লগইন স্ক্রিনে নিয়ে যাবে
        }

        // ২. লগইন করার সময় সঠিক ডাটা যাচাই করার ফাংশন
        function handleLogin() {
            const emailInput = document.getElementById('login-email').value.trim();
            const passwordInput = document.getElementById('login-password').value.trim();

            // ব্রাউজার মেমোরি থেকে আগের সেভ করা ডাটা তুলে আনা হচ্ছে
            const savedEmail = localStorage.getItem('saved_email');
            const savedPassword = localStorage.getItem('saved_password');

            // যদি কোনো একাউন্ট রেজিস্টার করাই না থাকে
            if(!savedEmail) {
                alert('এই ব্রাউজারে কোনো একাউন্ট খুঁজে পাওয়া যায়নি! প্রথমে Register Now-তে ক্লিক করে একাউন্ট তৈরি করুন।');
                return;
            }

            // ইনপুট দেওয়া ডাটার সাথে ম্যাচিং চেক করা হচ্ছে
            if (emailInput === savedEmail && passwordInput === savedPassword) {
                alert('অভিনন্দন! লগইন সফল হয়েছে।');
                window.location.href = 'dashboard.html'; // শুধু মিললেই ড্যাশবোর্ডে ঢুকতে দেবে
            } else {
                alert('দুঃখিত! ভুল ইমেইল বা পাসওয়ার্ড দিয়েছেন। আবার চেষ্টা করুন।');
            }
        }
    </script>

</body>
</html>
