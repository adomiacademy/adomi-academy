<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<a href="#">Create Account</a>

</div>

</body>
</html>
