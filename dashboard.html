<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Adomi Academy</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b111e; --bg-card: #111827; --bg-hover: #1f2937; --text-main: #ffffff; --text-muted: #9ca3af; --primary-pink: #ff2d55; --accent-purple: #6366f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }
        .dashboard-container { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background-color: var(--bg-card); border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 20px; display: flex; flex-direction: column; gap: 40px; }
        .logo { display: flex; align-items: center; gap: 12px; color: var(--text-main); font-size: 20px; font-weight: 700; text-decoration: none; padding-left: 10px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; padding: 14px 16px; border-radius: 10px; font-size: 15px; transition: 0.2s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background-color: var(--bg-hover); color: var(--text-main); }
        .main-content { padding: 40px 5%; overflow-y: auto; }
        .content-header { margin-bottom: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 16px; display: flex; align-items: center; gap: 20px; }
        .dashboard-course-item { background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 15px;}
        .continue-btn { background-color: var(--primary-pink); color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; }
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <a href="#" class="logo"><i class="fa-solid fa-graduation-cap" style="color: var(--primary-pink);"></i> <span>Adomi Academy</span></a>
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h1 id="welcome-message">Welcome back! 👋 <span>আপনার কোর্সগুলো কমপ্লিট করুন।</span></h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="stat-info">
                        <h3 id="enrolled-count">0</h3>
                        <p>Enrolled Courses</p>
                    </div>
                </div>
            </div>

            <div id="course-list-container">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-auth.js";

        // আপনার ফায়ারবেস কনফিগারেশন এখানে বসান
        const firebaseConfig = { /* আপনার কনফিগ */ };
        initializeApp(firebaseConfig);

        const auth = getAuth();
        
        // ১. সিকিউরিটি চেক
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; // লগইন না থাকলে পাঠিয়ে দাও
            } else {
                // ২. নাম সেট করা
                document.getElementById("welcome-message").innerHTML = `Welcome back, ${user.displayName || 'Student'}! 👋`;
            }
        });

        // ৩. লগআউট ফাংশন
        window.logout = () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        };
    </script>
</body>
</html>
